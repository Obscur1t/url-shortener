services:
  postgres:
    image: postgres:16-alpine
    container_name: shortener-postgres
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  goose:
    image: gomicro/goose
    container_name: migrations
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      goose postgres "host=postgres user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=${POSTGRES_SSL}" up -dir /migrations

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    env_file:
      - .env
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      goose:
        condition: service_completed_successfully

volumes:
  pg_data:

networks:
  app_network:
    driver: bridge
